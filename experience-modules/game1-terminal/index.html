<!DOCTYPE html>
<html lang="en" data-deck-page="terminal-3d">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Terminal — 3D Command Center · HABIBI-SIEM</title>
  <link rel="stylesheet" href="../../assets/palette.css" />
  <link rel="stylesheet" href="../shared/styles-base.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <link rel="stylesheet" href="../../experience-modules/shared/dio-guide.css" />
</head>
<body>
  <div id="hud-top">
    <span id="hud-game">THE TERMINAL · 3D</span>
    <span id="hud-level">LEVEL 1</span>
    <span id="hud-timer"></span>
    <div id="hud-load-wrap"><span>SYS LOAD</span><div id="hud-load-bar"><div id="hud-load-fill"></div></div></div>
  </div>
  <div id="canvas-host"></div>
  <div id="terminal-panel">
    <div id="task-text">Loading mission…</div>
    <div id="term-out"></div>
    <form id="term-form"><span id="term-prompt">analyst@meridian-7:~$</span><input id="term-in" type="text" autocomplete="off" spellcheck="false" aria-label="Terminal command" /></form>
  </div>
  <div id="branch-overlay" class="hidden">
    <div class="branch-card">
      <h3 id="branch-title">Decision</h3>
      <p id="branch-desc"></p>
      <div id="branch-btns"></div>
    </div>
  </div>
  <div id="level-complete" class="hidden">
    <div class="complete-card">
      <h2 id="complete-title">Level complete</h2>
      <p id="complete-msg"></p>
      <p id="complete-realworld" class="realworld"></p>
      <button type="button" id="btn-continue">Continue</button>
    </div>
  </div>
  <aside id="skill-sidebar">
    <h4>Skill challenges</h4>
    <ul id="skill-list"></ul>
    <h4>Leaderboard · Speed Trial</h4>
    <div id="lb-speed"></div>
  </aside>
  <div id="deck-nav-root"></div>
  <script src="../../assets/siem-core.js"></script>
  <script src="../../assets/palette.js"></script>
  <script src="../shared/progression-manager.js"></script>
  <script src="../shared/learning-system.js"></script>
  <script src="../shared/leaderboard-manager.js"></script>
  <script src="../shared/physics-bridge.js"></script>
  <script src="../shared/game-engine-base.js"></script>
  <script src="../shared/game-shell.js"></script>
  <script src="game.js"></script>
  <script src="../../assets/deck-nav.js"></script>
  <script>SiemCore.bootPage('terminal');</script>
  <script src="../../experience-modules/shared/narrative-engine.js"></script>
<script src="../../experience-modules/shared/dio-guide.js"></script>
</body>
</html>
