<!DOCTYPE html>
<html lang="en" data-deck-page="experience-hub">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Experience Ring — HABIBI-SIEM</title>
  <link rel="stylesheet" href="../assets/palette.css" />
  <link rel="stylesheet" href="shared/styles-base.css" />
  <style>
    body { background: #030a12; color: #94a3b8; font-family: 'IBM Plex Mono', monospace; padding: 24px; }
    h1 { color: #38bdf8; font-size: 18px; letter-spacing: 3px; margin-bottom: 8px; }
    p.sub { font-size: 11px; margin-bottom: 24px; color: #64748b; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; max-width: 1100px; }
    .card { border: 1px solid rgba(56,189,248,.25); padding: 14px; border-radius: 6px; background: rgba(10,13,26,.7); text-decoration: none; color: inherit; transition: border-color .2s; }
    .card:hover { border-color: #38bdf8; }
    .card h2 { font-size: 12px; color: #e2e8f0; margin-bottom: 6px; letter-spacing: 1px; }
    .card span { font-size: 10px; color: #64748b; }
    .tools { margin-top: 32px; font-size: 10px; }
    .tools button { background: rgba(56,189,248,.15); border: 1px solid rgba(56,189,248,.35); color: #38bdf8; padding: 8px 12px; cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
  <h1>MERIDIAN-7 · 3D EXPERIENCE RING</h1>
  <p class="sub">Thirteen linked modules — Cannon-es physics, multi-step levels, 15 story branches per game, GitHub leaderboard sync.</p>
  <div class="grid" id="game-grid"></div>
  <div class="tools">
    <button type="button" id="btn-export-lb">Export pending leaderboard scores</button>
    <button type="button" id="btn-sync-lb">Refresh leaderboards from GitHub JSON</button>
  </div>
  <div id="deck-nav-root"></div>
  <script src="../assets/siem-core.js"></script>
  <script src="../assets/palette.js"></script>
  <script src="shared/leaderboard-manager.js"></script>
  <script src="shared/progression-manager.js"></script>
  <script src="../assets/deck-nav.js"></script>
  <script>
  (function () {
    var games = [
      ['game1-terminal', 'The Terminal', 'CLI command center'],
      ['game2-breach', 'The Breach', 'SOC alert triage'],
      ['game3-network', 'Ghost Network', 'Topology & lateral movement'],
      ['game4-cipher', 'The Cipher', 'Cryptanalysis workshop'],
      ['game5-simulation', 'The Simulation', 'Kill chain timeline'],
      ['game6-intercept', 'Interrogation Room', 'C2 decode & IOCs'],
      ['game7-forge', 'The Forge', 'Detection rule smithy'],
      ['game8-archive', 'Deep Archive', 'Log forensics vault'],
      ['game9-heist', 'The Heist', 'Red team exfil planner'],
      ['game10-lab', 'The Lab', 'Payload & detection lab'],
      ['game11-cartography', 'Cartography', 'Threat globe'],
      ['game12-memorial', 'The Memorial', 'Breach lessons wall'],
      ['game13-resonance', 'Resonance', 'Detection mixer']
    ];
    var grid = document.getElementById('game-grid');
    games.forEach(function (g, i) {
      var a = document.createElement('a');
      a.className = 'card';
      a.href = g[0] + '/index.html';
      var locked = i > 0 && HabibiProgression && !HabibiProgression.isGameUnlocked(
        ['the_terminal','the_breach','the_ghost_network','the_cipher','the_simulation',
         'the_interrogation_room','the_forge','the_deep_archive','the_heist','the_lab',
         'the_cartography','the_memorial','the_resonance'][i]
      );
      a.innerHTML = '<h2>' + (locked ? '🔒 ' : '') + g[1] + '</h2><span>' + g[2] + '</span>';
      grid.appendChild(a);
    });
    document.getElementById('btn-export-lb').onclick = function () {
      if (HabibiLeaderboard.exportPendingJson) HabibiLeaderboard.exportPendingJson();
    };
    document.getElementById('btn-sync-lb').onclick = function () {
      if (HabibiLeaderboard.syncAllFromManifest) HabibiLeaderboard.syncAllFromManifest().then(function () { alert('Leaderboards synced from GitHub JSON.'); });
    };
    SiemCore.bootPage('hub');
  })();
  </script>
</body>
</html>
