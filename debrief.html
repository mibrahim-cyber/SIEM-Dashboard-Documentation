<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HABIBI-SIEM — Debrief</title>
  <meta name="description" content="Session debrief and performance summary.">
  <meta name="theme-color" content="#020617">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/palette.css">
  <link rel="stylesheet" href="assets/components.css">
  <style>
    .debrief {
      min-height: 100vh;
      background: var(--void-0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      text-align: center;
      position: relative;
    }

    .debrief::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 50%, rgba(56,189,248,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .debrief-card {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
      background: var(--void-glass);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-lg);
      padding: var(--space-8);
      backdrop-filter: blur(12px);
    }

    .debrief-icon {
      font-size: 48px;
      margin-bottom: var(--space-4);
    }

    .debrief-title {
      font-family: var(--font-display);
      font-size: 24px;
      color: var(--text-primary);
      letter-spacing: 0.1em;
      margin-bottom: var(--space-2);
    }

    .debrief-subtitle {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: var(--space-6);
    }

    .debrief-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
      text-align: center;
    }

    .debrief-stat {
      padding: var(--space-3);
      background: var(--void-2);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius-sm);
    }

    .debrief-stat-value {
      font-family: var(--font-display);
      font-size: 20px;
      color: var(--cyan);
    }

    .debrief-stat-label {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .debrief-actions {
      display: flex;
      gap: var(--space-3);
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 480px) {
      .debrief-stats { grid-template-columns: 1fr; }
      .debrief-card { padding: var(--space-4); }
    }
  </style>
</head>
<body>
  <div class="debrief">
    <div class="debrief-card fade-up">
      <div class="debrief-icon">◑</div>
      <h1 class="debrief-title">Session Debrief</h1>
      <p class="debrief-subtitle">Meridian-7 operations summary</p>

      <div class="debrief-stats">
        <div class="debrief-stat">
          <span class="debrief-stat-value" id="d-session">—</span>
          <span class="debrief-stat-label">Session Time</span>
        </div>
        <div class="debrief-stat">
          <span class="debrief-stat-value" id="d-visited">—</span>
          <span class="debrief-stat-label">Pages Visited</span>
        </div>
        <div class="debrief-stat">
          <span class="debrief-stat-value" id="d-achievements">—</span>
          <span class="debrief-stat-label">Achievements</span>
        </div>
        <div class="debrief-stat">
          <span class="debrief-stat-value" id="d-eggs">—</span>
          <span class="debrief-stat-label">Secrets Found</span>
        </div>
      </div>

      <div class="debrief-actions">
        <a href="index.html" class="btn-primary">Return to Approach</a>
        <a href="brain/index.html" class="btn-secondary">Observation Deck</a>
      </div>
    </div>
  </div>

  <div class="scan-line-overlay" aria-hidden="true"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="assets/siem-core.js"></script>
  <script src="assets/components.js"></script>
  <script>
    SiemCore.bootPage('debrief');

    var ss = SiemCore.SessionState;
    var as = SiemCore.AchievementSystem;

    document.getElementById('d-session').textContent = ss.sessionMinutes() + 'm';
    document.getElementById('d-visited').textContent = (ss.get('visited') || []).length;
    document.getElementById('d-achievements').textContent = as.count() + '/' + as.total();
    document.getElementById('d-eggs').textContent = ss.get('eggCount', 0);
  </script>
</body>
</html>
