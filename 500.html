<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 — System Error</title>
  <meta name="theme-color" content="#020617">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/palette.css">
  <link rel="stylesheet" href="assets/components.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--void-0);
      text-align: center;
      padding: var(--space-6);
      position: relative;
    }
    .error-page::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 50% 30% at 50% 50%, rgba(248,113,113,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(80px, 20vw, 160px);
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      margin-bottom: var(--space-2);
      text-shadow: 0 0 40px rgba(251,191,36,0.3);
    }
    .error-title {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--text-primary);
      letter-spacing: 0.15em;
      margin-bottom: var(--space-2);
    }
    .error-desc {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      max-width: 400px;
      margin-bottom: var(--space-6);
      line-height: 1.6;
    }
    .error-actions {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">500</div>
    <h1 class="error-title">System Error</h1>
    <p class="error-desc">Meridian-7 encountered an internal fault. Diagnostics have been logged. Please try again or return to a known stable state.</p>
    <div class="error-actions">
      <a href="index.html" class="btn-primary">Return to Approach</a>
      <a href="brain/index.html" class="btn-secondary">Observation Deck</a>
    </div>
  </div>
  <div class="scan-line-overlay" aria-hidden="true"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="assets/siem-core.js"></script>
  <script src="assets/components.js"></script>
  <script>SiemCore.bootPage('500');</script>
</body>
</html>
