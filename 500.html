  <title>500 — Station Fault</title>  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/palette.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: #0a0408;
      color: #fecaca;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% 100%, rgba(239, 68, 68, 0.12), transparent 50%);
    }
    .err-panel {
      max-width: 520px;
      text-align: center;
      padding: 48px 32px;
      background: rgba(20, 8, 12, 0.9);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 12px;
    }
    .err-code {
      font: 800 72px/1 Orbitron, sans-serif;
      color: #f87171;
      text-shadow: 0 0 40px rgba(248, 113, 113, 0.35);
      margin-bottom: 8px;
    }
    .err-title {
      font: 600 18px/1.3 "IBM Plex Mono", monospace;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fca5a5;
      margin-bottom: 16px;
    }
    .err-msg { color: #fecaca; line-height: 1.65; margin-bottom: 28px; font-size: 15px; opacity: 0.9; }
    .err-actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .err-btn {
      display: inline-block;
      padding: 10px 20px;
      font: 500 12px/1 "IBM Plex Mono", monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      color: #fecaca;
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.35);
      border-radius: 6px;
      cursor: pointer;
    }
    .err-btn:hover { background: rgba(248, 113, 113, 0.22); }
    .err-btn--ghost { background: transparent; border-color: rgba(248, 113, 113, 0.2); }
    .err-hint { margin-top: 24px; font: 400 11px/1 "IBM Plex Mono", monospace; color: #7f1d1d; }
    @media print { .err-btn { display: none; } }
  </style>
</head>
<body>
  <main class="err-panel">
    <div class="err-code">500</div>
    <h1 class="err-title">Hull Breach</h1>
    <p class="err-msg">Internal systems reported a critical fault. Containment fields are holding, but this sector is temporarily offline.</p>
    <div class="err-actions">
      <a class="err-btn" href="index.html">Emergency Return</a>
      <button type="button" class="err-btn err-btn--ghost" onclick="location.reload()">Retry Link</button>
    </div>
    <p class="err-hint">Incident logged · Meridian-7 v15.1</p>
  </main>
  <script src="assets/siem-core.js"></script>
  <script>SiemCore.bootPage('500');</script>
</body>
</html>
