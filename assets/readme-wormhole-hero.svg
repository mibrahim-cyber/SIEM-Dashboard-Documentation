<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 560" role="img" aria-label="Meridian-7 wormhole with orbiting SOC modules">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#0c1630"/>
      <stop offset="55%" stop-color="#040810"/>
      <stop offset="100%" stop-color="#010204"/>
    </radialGradient>
    <radialGradient id="neb1" cx="25%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="78%" cy="65%" r="45%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="disc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="25%" stop-color="#fdba74"/>
      <stop offset="55%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#7c2d12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="photon" cx="50%" cy="50%" r="50%">
      <stop offset="72%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="88%" stop-color="#fffef0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1440" height="560" fill="url(#bg)"/>
  <rect width="1440" height="560" fill="url(#neb1)"/>
  <rect width="1440" height="560" fill="url(#neb2)"/>

  <g fill="#e2e8f0" opacity="0.75">
    <circle cx="80" cy="60" r="1.2"/><circle cx="220" cy="40" r="0.9"/><circle cx="380" cy="90" r="1"/>
    <circle cx="520" cy="30" r="1.1"/><circle cx="920" cy="55" r="0.8"/><circle cx="1100" cy="80" r="1.2"/>
    <circle cx="1320" cy="45" r="1"/><circle cx="1240" cy="200" r="0.9"/><circle cx="140" cy="240" r="1"/>
    <circle cx="60" cy="420" r="1.1"/><circle cx="300" cy="480" r="0.8"/><circle cx="1180" cy="460" r="1"/>
    <circle cx="1360" cy="380" r="0.9"/><circle cx="680" cy="520" r="1"/>
  </g>

  <!-- filament web (Correlation hub) -->
  <g stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1.2" fill="none">
    <path d="M 720 280 Q 580 220 420 200"/>
    <path d="M 720 280 Q 860 210 980 190"/>
    <path d="M 720 280 Q 900 320 1040 340"/>
    <path d="M 720 280 Q 560 340 440 380"/>
    <path d="M 720 280 Q 820 360 920 400"/>
    <path d="M 420 200 Q 500 250 580 300"/>
    <path d="M 980 190 Q 900 250 820 300"/>
  </g>
  <g fill="#38bdf8" opacity="0.5">
    <circle cx="500" cy="248" r="2"/><circle cx="640" cy="268" r="1.5"/><circle cx="780" cy="248" r="2"/>
    <circle cx="860" cy="290" r="1.5"/><circle cx="600" cy="310" r="2"/>
  </g>

  <!-- orbit ring guides -->
  <ellipse cx="720" cy="280" rx="340" ry="120" fill="none" stroke="#7c3aed" stroke-opacity="0.08" stroke-width="1"/>
  <ellipse cx="720" cy="280" rx="480" ry="155" fill="none" stroke="#7c3aed" stroke-opacity="0.06" stroke-width="1"/>

  <!-- wormhole -->
  <g transform="translate(720,280)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="200" ry="52" fill="url(#disc)" opacity="0.55" transform="rotate(-12)"/>
    <ellipse cx="0" cy="0" rx="165" ry="44" fill="url(#disc)" opacity="0.35" transform="rotate(-12)"/>
    <ellipse cx="0" cy="0" rx="200" ry="52" fill="url(#photon)" transform="rotate(-12)"/>
    <ellipse cx="0" cy="-58" rx="175" ry="38" fill="none" stroke="#fdba74" stroke-width="8" opacity="0.35" transform="rotate(-12)"/>
    <ellipse cx="0" cy="58" rx="175" ry="38" fill="none" stroke="#fdba74" stroke-width="8" opacity="0.35" transform="rotate(-12)"/>
    <circle cx="0" cy="0" r="52" fill="#000000"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="#fffef0" stroke-width="2" opacity="0.85"/>
  </g>

  <!-- planets + labels -->
  <g font-family="Consolas, monospace" font-size="13" fill="#bae6fd" filter="url(#nodeGlow)">
    <g>
      <circle cx="720" cy="280" r="10" fill="#a78bfa"/>
      <text x="735" y="284">Correlation</text>
    </g>
    <g>
      <circle cx="420" cy="200" r="9" fill="#fb7185"/>
      <text x="380" y="188">SQL Injection</text>
    </g>
    <g>
      <circle cx="980" cy="190" r="8" fill="#fbbf24"/>
      <text x="995" y="194">XSS Attempt</text>
    </g>
    <g>
      <circle cx="1040" cy="340" r="8" fill="#f59e0b"/>
      <text x="1055" y="344">Brute Force</text>
    </g>
    <g>
      <circle cx="440" cy="380" r="7" fill="#38bdf8"/>
      <text x="455" y="384">Alert Manager</text>
    </g>
    <g>
      <circle cx="920" cy="400" r="7" fill="#f472b6"/>
      <text x="935" y="404">SOAR Console</text>
    </g>
    <g>
      <circle cx="380" cy="300" r="6" fill="#5eead4"/>
      <text x="395" y="304">Threat Intel</text>
    </g>
    <g>
      <circle cx="1060" cy="260" r="6" fill="#34d399"/>
      <text x="1075" y="264">Geo Map</text>
    </g>
    <g>
      <circle cx="580" cy="160" r="6" fill="#c4b5fd"/>
      <text x="595" y="164">SIEM Dashboard</text>
    </g>
    <g>
      <circle cx="860" cy="150" r="6" fill="#86efac"/>
      <text x="875" y="154">Cryptography</text>
    </g>
  </g>

  <text x="720" y="520" text-anchor="middle" fill="#64748b" font-family="Consolas, monospace" font-size="11" letter-spacing="3">LIVE � ORBITING MODULE MAP � MERIDIAN-7</text>
</svg>
