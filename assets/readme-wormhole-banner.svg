<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-label="Meridian-7 wormhole observation deck">
  <defs>
    <radialGradient id="void" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="45%" stop-color="#0a0618"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="nebula1" cx="30%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="78%" cy="62%" r="40%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="disk" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="35%" stop-color="#fb923c"/>
      <stop offset="65%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
    <radialGradient id="core" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="70%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="960" height="320" fill="url(#void)"/>
  <rect width="960" height="320" fill="url(#nebula1)"/>
  <rect width="960" height="320" fill="url(#nebula2)"/>
  <!-- stars -->
  <g fill="#e2e8f0" opacity="0.85">
    <circle cx="42" cy="28" r="1"/><circle cx="128" cy="64" r="1.2"/><circle cx="220" cy="22" r="0.8"/>
    <circle cx="310" cy="88" r="1"/><circle cx="680" cy="44" r="1.1"/><circle cx="820" cy="72" r="0.9"/>
    <circle cx="900" cy="28" r="1.3"/><circle cx="760" cy="140" r="0.7"/><circle cx="88" cy="180" r="1"/>
    <circle cx="180" cy="240" r="0.9"/><circle cx="880" cy="260" r="1"/><circle cx="540" cy="18" r="0.8"/>
  </g>
  <!-- dyson ghost ring -->
  <ellipse cx="480" cy="158" rx="210" ry="72" fill="none" stroke="#a78bfa" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="8 12"/>
  <!-- hull arc -->
  <path d="M 0 290 Q 480 250 960 290" fill="none" stroke="#475569" stroke-opacity="0.35" stroke-width="2"/>
  <!-- solar wing left -->
  <g transform="translate(118,200) rotate(-12)">
    <rect x="0" y="0" width="54" height="28" fill="#0f172a" stroke="#64748b" stroke-width="1"/>
    <line x1="9" y1="0" x2="9" y2="28" stroke="#334155"/><line x1="18" y1="0" x2="18" y2="28" stroke="#334155"/>
    <line x1="27" y1="0" x2="27" y2="28" stroke="#334155"/><line x1="36" y1="0" x2="36" y2="28" stroke="#334155"/>
    <line x1="45" y1="0" x2="45" y2="28" stroke="#334155"/>
  </g>
  <!-- relay sat left -->
  <g transform="translate(200,95)">
    <rect x="-8" y="-4" width="16" height="8" fill="#64748b"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#38bdf8" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#94a3b8"/>
  </g>
  <!-- buoy right -->
  <g transform="translate(780,110)">
    <rect x="-3" y="-10" width="6" height="14" fill="#475569"/>
    <circle cx="0" cy="-12" r="4" fill="#f59e0b" opacity="0.9"/>
  </g>
  <!-- comms dish right -->
  <path d="M 840 210 Q 860 190 880 210" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="860" y1="210" x2="860" y2="222" stroke="#64748b"/>
  <!-- wormhole -->
  <g transform="translate(480,158)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="118" ry="32" fill="none" stroke="url(#disk)" stroke-width="10" opacity="0.55" transform="rotate(-18)"/>
    <ellipse cx="0" cy="0" rx="92" ry="26" fill="none" stroke="#fef9c3" stroke-width="2" opacity="0.85" transform="rotate(-18)"/>
    <ellipse cx="0" cy="0" rx="72" ry="20" fill="url(#disk)" opacity="0.45" transform="rotate(-18)"/>
    <circle cx="0" cy="0" r="22" fill="url(#core)"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#fef9c3" stroke-opacity="0.5" stroke-width="1"/>
  </g>
  <!-- orbit nodes -->
  <g>
    <circle cx="340" cy="130" r="6" fill="#5eead4" opacity="0.9"/>
    <circle cx="620" cy="118" r="5" fill="#c4b5fd" opacity="0.9"/>
    <circle cx="650" cy="200" r="4" fill="#f472b6" opacity="0.85"/>
    <circle cx="310" cy="210" r="4" fill="#38bdf8" opacity="0.85"/>
    <circle cx="560" cy="240" r="3" fill="#fbbf24" opacity="0.8"/>
  </g>
  <!-- tether lines -->
  <g stroke="#38bdf8" stroke-opacity="0.25" stroke-width="1">
    <line x1="340" y1="130" x2="430" y2="150"/><line x1="620" y1="118" x2="530" y2="145"/>
    <line x1="650" y1="200" x2="520" y2="170"/>
  </g>
  <!-- frame corners -->
  <g stroke="#38bdf8" stroke-opacity="0.45" fill="none" stroke-width="2">
    <path d="M 16 16 H 48 V 48"/><path d="M 944 16 H 912 V 48"/>
    <path d="M 16 304 H 48 V 272"/><path d="M 944 304 H 912 V 272"/>
  </g>
  <!-- title block -->
  <text x="480" y="42" text-anchor="middle" fill="#c4b5fd" font-family="Consolas, monospace" font-size="11" letter-spacing="4">MERIDIAN-7 · OBSERVATION DECK</text>
  <text x="480" y="68" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="22" font-weight="700">SIEM Dashboard — Live Site</text>
  <!-- CTA pill -->
  <rect x="300" y="248" width="360" height="44" rx="22" fill="#0ea5e9" opacity="0.95"/>
  <rect x="300" y="248" width="360" height="44" rx="22" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
  <text x="480" y="276" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">▶  ENTER LIVE SITE</text>
  <text x="480" y="298" text-anchor="middle" fill="#94a3b8" font-family="Consolas, monospace" font-size="9">wormhole map · shuttle approach · 58 station props</text>
</svg>
