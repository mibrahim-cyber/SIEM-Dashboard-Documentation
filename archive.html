        narrative: [
          'An attacker with a valid username and password from a prior breach spammed MFA push notifications to a helpdesk supervisor\'s phone between 01:00 and 01:47 UTC. The supervisor eventually approved one request to silence the alerts.',
          'Meridian-7 detected the compromise via impossible travel: successful auth from Romania four minutes after a legitimate session from Virginia. The MFA approval count — 34 pushes in 47 minutes — became a new correlation signal.',
          'Session was terminated and all privileged tokens revoked within 12 minutes of the approval.'
        ],
        findings: ['MFA push bombing exploited human fatigue at off-hours', '34 push approvals in 47 minutes is a quantifiable signal', 'Password was valid from unrelated prior third-party breach'],
        recommendations: ['Deploy number-matching MFA for all privileged accounts', 'Alert on greater than 10 MFA pushes to single user in 15 minutes', 'Block auth from countries not in user\'s historical profile'],
        rule: 'rule=mfa-push-bombing threshold=10 window=15m action=BLOCK AUTH'
      },
      {
        id: 'M7-2021-058', date: '2021-09-15', classification: 'CONFIDENTIAL',
        title: 'SQL Injection — Legacy Reporting Portal',
        narrative: [
          'A legacy PHP reporting portal, excluded from the annual pen test scope due to planned decommission, was hit by automated SQL injection via the sort parameter. The attacker extracted 8,400 user records including bcrypt password hashes.',
          'WAF signatures were outdated for the portal\'s custom encoding scheme. Detection came from database audit logs showing UNION queries from the web service account — an account that should only execute parameterized stored procedures.',
          'Portal was taken offline within two hours. Decommission timeline was accelerated from Q2 to immediate.'
        ],
        findings: ['Legacy app excluded from security testing scope', 'Web service DB account had excessive SELECT privileges', 'Database audit logging was the sole detection source'],
        recommendations: ['Remove all legacy apps from pen test exclusions', 'Restrict web service accounts to stored procedure execution only', 'Alert on UNION keyword in application DB query logs'],
        rule: 'rule=sqli-union-db-audit action=ALERT HIGH block=source-ip'
      },
      {
        id: 'M7-2022-019', date: '2022-05-27', classification: 'CONFIDENTIAL',
        title: 'Cryptomining Outbreak — East-West Propagation',
        narrative: [
          'A Tomcat deserialization vulnerability on a staging server was exploited to deploy XMRig. The miner propagated via stolen service credentials to fourteen production-adjacent hosts before CPU threshold alerts fired.',
          'Staging environments lacked the production SIEM forwarder agent — a cost-saving measure reversed immediately after this incident. Production detection occurred only when east-west traffic to a public pool on port 3333 was blocked by a newly deployed IDS rule.',
          'Estimated electricity and cloud compute waste: $12,400 over nine days.'
        ],
        findings: ['Staging servers lacked SIEM agent coverage', 'Service credential reuse enabled east-west spread', 'Port 3333 outbound to mining pools was unblocked'],
        recommendations: ['Mandate SIEM agents on all environments including staging', 'Block outbound mining pool ports at egress firewall', 'Alert on sustained CPU above 85% for more than 30 minutes'],
        rule: 'rule=cryptomine-cpu-sustained threshold=85% window=30m action=ISOLATE HOST'
      },
      {
        id: 'M7-2023-019', date: '2023-07-22', classification: 'SECRET',
        title: 'Tor Exit Exfiltration — Anonymized Data Staging',
        narrative: [
          'An insider staged 6.7 GB of intellectual property on a personal cloud drive, then used Tor Browser from a corporate workstation to verify upload completion through an exit node. NetFlow showed TLS to known Tor guard nodes.',
          'DLP blocked the initial upload attempt to the personal drive, but a second attempt succeeded via an allowed business collaboration platform abused as a staging area.',
          'Tor exit connection from corporate workstation was the evidentiary signal that triggered legal proceedings.'
        ],
        findings: ['Collaboration platform allowed uploads DLP flagged elsewhere', 'Tor guard node connections visible in NetFlow metadata', 'Insider used approved tool to launder exfil path'],
        recommendations: ['Block Tor guard/bridge IPs at corporate egress', 'Unify DLP policies across all cloud storage integrations', 'Alert on Tor-related TLS SNI from managed endpoints'],
        rule: 'rule=tor-exit-corporate-egress action=ALERT CRIT isolate=workstation'
      },
      {
        id: 'M7-2024-008', date: '2024-03-11', classification: 'SECRET',
        title: 'Double Extortion Ransomware — Data Leak Site Posting',
        narrative: [
          'Ransomware operators exfiltrated 340 GB before encryption and posted a proof archive on a leak site when Meridian-7 refused negotiation. The encryption phase was contained to three file servers; exfil had occurred over five nights via scheduled tasks.',
          'Scheduled task creation at 02:00 UTC across multiple hosts was the hunting query that revealed the pre-encryption staging. NDR detected the exfil volume but below the threshold calibrated for backup windows.',
          'Recovery from clean backups took 36 hours. Legal and PR teams managed leak site takedown via threat intel retainer.'
        ],
        findings: ['Scheduled task creation at uniform off-hours across hosts', 'Exfil volume masked by overlapping backup traffic', 'Leak site posting preceded encryption by 72 hours'],
        recommendations: ['Alert on identical scheduled tasks created on more than 3 hosts in 24h', 'Separate exfil detection thresholds for backup vs business hours', 'Pre-negotiate leak site monitoring with threat intel provider'],
        rule: 'rule=ransomware-scheduled-task-spray threshold=3 window=24h action=ALERT CRIT'
      },
      {
        id: 'M7-2022-027', date: '2022-07-04', classification: 'SECRET',
        title: 'Privilege Abuse — Domain Admin Impersonation',
        narrative: [
          'A helpdesk technician used a cached Domain Admin credential from a legacy RDP session on a jump box to access HR systems outside any approved ticket. The action violated separation of duties but used technically valid credentials.',
          'Meridian-7 UEBA flagged the session because the technician\'s role had never previously accessed the HR admin console, and the access occurred on a US holiday when HR staff were absent.',
          'Investigation revealed a pattern of three similar accesses over two months, each justified post-hoc with forged ticket numbers.'
        ],
        findings: ['Cached DA credentials on jump box violated tiering policy', 'Role-based access anomaly detected via UEBA', 'Forged ticket numbers discovered in retrospective audit'],
        recommendations: ['Enforce credential guard on all tier-0 accounts', 'Alert when helpdesk roles access HR/finance admin consoles', 'Require live ticket API validation for privileged access'],
        rule: 'rule=privilege-role-anomaly tier0-cached action=ALERT HIGH revoke=session'
      },
      {
        id: 'M7-2021-072', date: '2021-12-30', classification: 'CONFIDENTIAL',
        title: 'DDoS Distraction — SYN Flood During Lateral Movement',
        narrative: [
          'A volumetric SYN flood against the public API gateway peaked at 180 Gbps during the final week of December. While network operations focused on scrubbing center failover, attackers moved laterally from a compromised API microservice to the payment processing subnet.',
          'The DDoS was a distraction: attack bandwidth correlated with lateral SMB traffic but the SOC war room was split across two incidents. Unified timeline view in Meridian-7 finally correlated the events when an analyst overlaid NetFlow with DDoS mitigation logs.',
          'Payment subnet isolation prevented transaction data access. The microservice vulnerability was a known Log4j instance on an unpatched container.'
        ],
        findings: ['DDoS and lateral movement occurred simultaneously by design', 'SOC split attention delayed lateral movement detection by 2 hours', 'Log4j patch was pending on one container for 19 days'],
        recommendations: ['Maintain unified timeline during concurrent incidents', 'Auto-escalate lateral movement alerts during active DDoS', 'Enforce patch SLA of 72 hours for critical CVEs on external-facing services'],
        rule: 'rule=ddos-lateral-movement-correlation action=ALERT CRIT mode=unified-timeline'
      }
    ];

    var root = document.getElementById('archive-root');
    var overlay = document.getElementById('overlay');
    var docInner = document.getElementById('doc-inner');
    var docScroll = document.getElementById('doc-scroll');
    var activeDrawer = null;
    var lenisInstance = null;
    var lenisRaf = null;
    var openedDocs = {};

    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0618);
    scene.fog = new THREE.Fog(0x0a0618, 8, 25);

    var camera = new THREE.PerspectiveCamera(68, root.clientWidth / root.clientHeight, 0.08, 60);
    camera.position.set(0, 1.6, 6);

    var renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(root.clientWidth, root.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    root.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x6366f1, 0.28));
    var dirLight = new THREE.DirectionalLight(0xc4b5fd, 0.55);
    dirLight.position.set(0, 5, 2);
    dirLight.castShadow = true;
    scene.add(dirLight);

    var floorCanvas = document.createElement('canvas');
    floorCanvas.width = 512;
    floorCanvas.height = 512;
    var fctx = floorCanvas.getContext('2d');
    fctx.fillStyle = '#0f0d24';
    fctx.fillRect(0, 0, 512, 512);
    fctx.strokeStyle = 'rgba(99,102,241,0.22)';
    fctx.lineWidth = 1;
    for (var g = 0; g <= 512; g += 32) {
      fctx.beginPath(); fctx.moveTo(g, 0); fctx.lineTo(g, 512); fctx.stroke();
      fctx.beginPath(); fctx.moveTo(0, g); fctx.lineTo(512, g); fctx.stroke();
    }
    var floorTex = new THREE.CanvasTexture(floorCanvas);
    floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
    floorTex.repeat.set(8, 16);
    var floor = new THREE.Mesh(
      new THREE.PlaneGeometry(14, 28),
      new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.85, metalness: 0.1 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    var ceiling = new THREE.Mesh(
      new THREE.PlaneGeometry(14, 28),
      new THREE.MeshStandardMaterial({ color: 0x080614, roughness: 1 })
    );
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.y = 3.2;
    scene.add(ceiling);

    var wallMat = new THREE.MeshStandardMaterial({ color: 0x120e2a, roughness: 0.95 });
    var backWall = new THREE.Mesh(new THREE.PlaneGeometry(14, 3.2), wallMat);
    backWall.position.set(0, 1.6, -8);
    scene.add(backWall);
    var frontWall = backWall.clone();
    frontWall.position.z = 8;
    frontWall.rotation.y = Math.PI;
    scene.add(frontWall);

    var lightPositions = [-4, -1.5, 1.5, 4];
    lightPositions.forEach(function (lx) {
      var housing = new THREE.Mesh(
        new THREE.BoxGeometry(1.4, 0.08, 0.5),
        new THREE.MeshStandardMaterial({ color: 0x1e1b4b, emissive: 0x312e81, emissiveIntensity: 0.3 })
      );
      housing.position.set(lx, 3.05, 0);
      scene.add(housing);
      var glow = new THREE.Mesh(
        new THREE.PlaneGeometry(1.2, 0.4),
        new THREE.MeshBasicMaterial({ color: 0xc4b5fd, transparent: true, opacity: 0.12, blending: THREE.AdditiveBlending })
      );
      glow.position.set(lx, 3.0, 0);
      glow.rotation.x = Math.PI / 2;
      scene.add(glow);
      var spot = new THREE.SpotLight(0xc4b5fd, 1.2, 12, Math.PI / 4, 0.4, 1.5);
      spot.position.set(lx, 2.95, 0);
      spot.target.position.set(lx, 0, 0);
      scene.add(spot);
      scene.add(spot.target);
    });

    var drawerMeshes = [];
    var cabMat = new THREE.MeshStandardMaterial({ color: 0x1e1b4b, roughness: 0.7, metalness: 0.15 });
    var drawerBodyMat = new THREE.MeshStandardMaterial({ color: 0x252350, roughness: 0.65, metalness: 0.2 });
    var handleMat = new THREE.MeshStandardMaterial({ color: 0xc4b5fd, roughness: 0.35, metalness: 0.55, emissive: 0x6366f1, emissiveIntensity: 0.15 });

    var zPositions = [-5.5, -2.8, -0.1, 2.6];
    var docIdx = 0;

    function buildCabinet(side, col) {
      var x = side * 2.35;
      var z = zPositions[col];
      var cabGroup = new THREE.Group();
      cabGroup.position.set(x, 0, z);
      if (side < 0) cabGroup.rotation.y = Math.PI / 2;
      else cabGroup.rotation.y = -Math.PI / 2;

      var shell = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 0.6), cabMat);
      shell.position.y = 1;
      shell.castShadow = true;
      cabGroup.add(shell);

      var drawerH = 0.58;
      var gap = 0.06;
      for (var d = 0; d < 3; d++) {
        var drawerGroup = new THREE.Group();
        var yBase = 0.35 + d * (drawerH + gap);
        var body = new THREE.Mesh(new THREE.BoxGeometry(1.05, drawerH - 0.04, 0.52), drawerBodyMat);
        body.position.y = yBase + drawerH / 2;
        drawerGroup.add(body);
        var handle = new THREE.Mesh(new THREE.BoxGeometry(0.36, 0.07, 0.08), handleMat);
        handle.position.set(0, yBase + drawerH / 2, 0.28);
        handle.userData.isHandle = true;
        drawerGroup.add(handle);
        var label = docIdx;
        drawerGroup.userData.docId = label;
        drawerGroup.userData.openOffset = 0;
        drawerGroup.userData.side = side;
        handle.userData.docId = label;
        handle.userData.parentDrawer = drawerGroup;
        drawerMeshes.push(handle);
        drawerMeshes.push(body);
        body.userData.docId = label;
        body.userData.parentDrawer = drawerGroup;
        cabGroup.add(drawerGroup);
        docIdx++;
      }
      scene.add(cabGroup);
    }

    for (var col = 0; col < 4; col++) {
      buildCabinet(-1, col);
      buildCabinet(1, col);
    }

    var keys = {};
    var yaw = 0;
    var pitch = 0;
    var looking = false;
    var lookStart = { x: 0, y: 0 };
    var velocity = new THREE.Vector3();
    var direction = new THREE.Vector3();
    var moveSpeed = 2.8;

    window.addEventListener('keydown', function (e) { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', function (e) { keys[e.key.toLowerCase()] = false; });

    renderer.domElement.addEventListener('contextmenu', function (e) { e.preventDefault(); });
    renderer.domElement.addEventListener('mousedown', function (e) {
      if (e.button === 2) {
        looking = true;
        lookStart.x = e.clientX;
        lookStart.y = e.clientY;
        document.getElementById('look-hint').classList.remove('visible');
      }
    });
    window.addEventListener('mouseup', function () { looking = false; });
    window.addEventListener('mousemove', function (e) {
      if (!looking) return;
      var dx = e.clientX - lookStart.x;
      var dy = e.clientY - lookStart.y;
      lookStart.x = e.clientX;
      lookStart.y = e.clientY;
      yaw -= dx * 0.0022;
      pitch -= dy * 0.0022;
      pitch = Math.max(-0.6, Math.min(0.6, pitch));
    });

    setTimeout(function () {
      document.getElementById('look-hint').classList.add('visible');
      setTimeout(function () { document.getElementById('look-hint').classList.remove('visible'); }, 3200);
    }, 800);

    var raycaster = new THREE.Raycaster();
    var mouse = new THREE.Vector2();

    function renderDocument(docId) {
      var doc = DOCUMENTS[docId];
      if (!doc) return;
      var cls = doc.classification.toLowerCase().replace(/\s+/g, '');
      var stampClass = cls === 'topsecret' ? 'topsecret' : cls === 'secret' ? 'secret' : 'confidential';
      docInner.innerHTML =
        '<div class="stamp ' + stampClass + '">' + doc.classification + '</div>' +
        '<h2 id="doc-title">' + doc.title + '</h2>' +
        '<div class="doc-date">INCIDENT ' + doc.id + ' · FILED ' + doc.date + '</div>' +
        doc.narrative.map(function (p) { return '<p>' + p + '</p>'; }).join('') +
        '<h3>KEY FINDINGS</h3><ul>' + doc.findings.map(function (f) { return '<li>' + f + '</li>'; }).join('') + '</ul>' +
        '<h3>RECOMMENDATIONS</h3><ul>' + doc.recommendations.map(function (r) { return '<li>' + r + '</li>'; }).join('') + '</ul>' +
        '<div class="rule-block">SIEM RULE DEPLOYED: ' + doc.rule + '</div>';
    }

    function openDrawer(drawerGroup) {
      if (activeDrawer && activeDrawer !== drawerGroup) closeDrawer(activeDrawer, false);
      activeDrawer = drawerGroup;
      var docId = drawerGroup.userData.docId;
      if (typeof gsap !== 'undefined') {
        gsap.to(drawerGroup.position, { z: 0.32, duration: 0.4, ease: 'power2.out' });
      } else {
        drawerGroup.position.z = 0.32;
      }
      drawerGroup.userData.openOffset = 0.32;
      renderDocument(docId);
      overlay.classList.add('show');
      openedDocs[docId] = true;
      if (Object.keys(openedDocs).length >= 3) SiemCore.AchievementSystem.check('archive_explorer');
      initLenis();
    }

    function closeDrawer(drawerGroup, hideOverlay) {
      if (!drawerGroup) return;
      if (typeof gsap !== 'undefined') {
        gsap.to(drawerGroup.position, { z: 0, duration: 0.38, ease: 'power2.in' });
      } else {
        drawerGroup.position.z = 0;
      }
      drawerGroup.userData.openOffset = 0;
      if (hideOverlay !== false) {
        overlay.classList.remove('show');
        activeDrawer = null;
        destroyLenis();
      }
    }

    function initLenis() {
      destroyLenis();
      if (typeof Lenis === 'undefined') return;
      docScroll.scrollTop = 0;
      lenisInstance = new Lenis({
        wrapper: docScroll,
        content: docInner,
        smoothWheel: true,
        duration: 1.1
      });
      function raf(t) {
        lenisInstance.raf(t);
        lenisRaf = requestAnimationFrame(raf);
      }
      lenisRaf = requestAnimationFrame(raf);
    }

    function destroyLenis() {
      if (lenisRaf) cancelAnimationFrame(lenisRaf);
      lenisRaf = null;
      if (lenisInstance) { lenisInstance.destroy(); lenisInstance = null; }
    }

    function closeOverlay() {
      if (activeDrawer) closeDrawer(activeDrawer, true);
      else overlay.classList.remove('show');
    }

    document.getElementById('doc-close').addEventListener('click', closeOverlay);
    overlay.addEventListener('click', function (e) { if (e.target === overlay) closeOverlay(); });
    window.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeOverlay();
    });

    renderer.domElement.addEventListener('click', function (e) {
      if (e.button !== 0) return;
      var rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      var hits = raycaster.intersectObjects(drawerMeshes, false);
      if (hits.length) {
        var obj = hits[0].object;
        var drawer = obj.userData.parentDrawer;
        if (drawer) openDrawer(drawer);
      }
    });

    var clock = new THREE.Clock();

    function updateMovement(dt) {
      direction.set(0, 0, 0);
      if (keys['w'] || keys['arrowup']) direction.z -= 1;
      if (keys['s'] || keys['arrowdown']) direction.z += 1;
      if (keys['a'] || keys['arrowleft']) direction.x -= 1;
      if (keys['d'] || keys['arrowright']) direction.x += 1;
      if (direction.lengthSq() > 0) {
        direction.normalize();
        var sinY = Math.sin(yaw);
        var cosY = Math.cos(yaw);
        var forward = new THREE.Vector3(sinY, 0, cosY);
        var right = new THREE.Vector3(cosY, 0, -sinY);
        velocity.copy(forward.multiplyScalar(-direction.z).add(right.multiplyScalar(direction.x)));
        velocity.multiplyScalar(moveSpeed * dt);
        camera.position.add(velocity);
      }
      camera.position.x = Math.max(-1.8, Math.min(1.8, camera.position.x));
      camera.position.z = Math.max(-6.5, Math.min(6.5, camera.position.z));
      camera.position.y = 1.6;
      camera.rotation.order = 'YXZ';
      camera.rotation.y = yaw;
      camera.rotation.x = pitch;
    }

    function animate() {
      requestAnimationFrame(animate);
      var dt = Math.min(clock.getDelta(), 0.05);
      if (!overlay.classList.contains('show')) updateMovement(dt);
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', function () {
      camera.aspect = root.clientWidth / root.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(root.clientWidth, root.clientHeight);
    });
  })();
  </script>
