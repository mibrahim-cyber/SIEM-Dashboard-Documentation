  <title>404 — Signal Lost</title>  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/palette.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: #020617;
      color: #e2e8f0;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% 0%, rgba(99, 102, 241, 0.15), transparent 55%);
    }
    .err-panel {
      max-width: 520px;
      text-align: center;
      padding: 48px 32px;
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 12px;
    }
    .err-code {
      font: 800 72px/1 Orbitron, sans-serif;
      color: #38bdf8;
      text-shadow: 0 0 40px rgba(56, 189, 248, 0.35);
      margin-bottom: 8px;
    }
    .err-title {
      font: 600 18px/1.3 "IBM Plex Mono", monospace;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 16px;
    }
    .err-msg { color: #cbd5e1; line-height: 1.65; margin-bottom: 28px; font-size: 15px; }
    .err-actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .err-btn {
      display: inline-block;
      padding: 10px 20px;
      font: 500 12px/1 "IBM Plex Mono", monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      color: #e2e8f0;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.35);
      border-radius: 6px;
      cursor: pointer;
    }
    .err-btn:hover { background: rgba(56, 189, 248, 0.22); }
    .err-btn--ghost { background: transparent; border-color: rgba(148, 163, 184, 0.25); }
    .err-hint { margin-top: 24px; font: 400 11px/1 "IBM Plex Mono", monospace; color: #475569; }
    @media print { .err-btn { display: none; } }
  </style>
  <link rel="stylesheet" href="experience-modules/shared/dio-guide.css" />
</head>
<body>
  <main class="err-panel">
    <div class="err-code">404</div>
    <h1 class="err-title">Signal Lost</h1>
    <p class="err-msg">The requested vector does not exist on Station Meridian-7. The route may have been decommissioned or never charted.</p>
    <div class="err-actions">
      <a class="err-btn" href="index.html">Return to Approach</a>
      <a class="err-btn err-btn--ghost" href="brain/index.html">Observation Deck</a>
      <button type="button" class="err-btn err-btn--ghost" id="err-palette-btn">Command Palette</button>
    </div>
    <p class="err-hint">Ctrl+K · Meridian-7 v15.1</p>
  </main>
  <script src="assets/siem-core.js"></script>
  <script src="assets/palette.js"></script>
  <script>
    SiemCore.bootPage('404');
    document.getElementById('err-palette-btn').addEventListener('click', function () {
      SiemCore.GlobalPalette.open();
    });
  </script>
  <script src="experience-modules/shared/narrative-engine.js"></script>
<script src="experience-modules/shared/dio-guide.js"></script>
</body>
</html>
