  <link rel="stylesheet" href="assets/palette.css" />
  <link rel="stylesheet" href="assets/deck-nav.css" />
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.27.0/dist/globe.gl.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:#020617;overflow:hidden;color:#e2e8f0;font-family:Consolas,monospace}
    #hdr{position:fixed;top:0;left:0;right:0;height:36px;display:flex;align-items:center;gap:12px;padding:0 12px;font-size:10px;letter-spacing:2px;z-index:10;background:rgba(15,23,42,.92);border-bottom:1px solid rgba(56,189,248,.2)}
    #globe{position:fixed;inset:36px 280px 0 0}#drawer{position:fixed;top:36px;right:0;width:280px;bottom:0;padding:12px;background:rgba(15,23,42,.96);border-left:1px solid rgba(56,189,248,.15);font-size:11px;overflow:auto}
    .layer{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:10px}
    .layer input{cursor:pointer}
  </style>
</head>
<body>
  <div id="hdr">CARTOGRAPHY · THREAT ARCS</div>
  <div id="globe"></div>
  <aside id="drawer"><h3 style="font-size:9px;letter-spacing:2px;margin-bottom:12px;color:#38bdf8">LAYERS</h3><div id="layers"></div><p id="country-info" style="margin-top:16px;color:#64748b">Click arc origin</p></aside>
  <script src="assets/siem-core.js"></script>
  <script src="assets/palette.js"></script>
  <script>
  (function(){
    SiemCore.bootPage('cartography'); SiemCore.AchievementSystem.check('visit_cartography');
    var LAYERS=['Alerts','Botnets','APT','Scanning','Tor Exit','C2','Exfil'];
    var layerState={}; LAYERS.forEach(function(l){layerState[l]=true;});
    var el=document.getElementById('layers');
    LAYERS.forEach(function(l){
      var row=document.createElement('label');row.className='layer';
      row.innerHTML='<input type="checkbox" checked data-layer="'+l+'" /> '+l;
      el.appendChild(row);
    });
    var arcs=[
      {startLat:51.5,startLng:-0.1,endLat:40.7,endLng:-74,color:'rgba(248,113,113,0.6)',country:'UK → US'},
      {startLat:35.6,startLng:139.6,endLat:1.3,endLng:103.8,color:'rgba(251,191,36,0.6)',country:'JP → SG'}
    ];
    var globe=Globe()(document.getElementById('globe'))
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
      .arcsData(arcs).arcColor('color').arcDashLength(0.4).arcDashGap(0.2).arcDashAnimateTime(2000)
      .onArcClick(function(d){document.getElementById('country-info').textContent=d.country;});
    el.addEventListener('change',function(e){
      if(e.target.dataset.layer){layerState[e.target.dataset.layer]=e.target.checked;globe.arcsData(arcs.filter(function(){return true;}));}
    });
  })();
  </script>
  <div id="deck-nav-root"></div>
  <script src="assets/deck-nav.js?v=15.2.0-exp-nav"></script>
</body>
